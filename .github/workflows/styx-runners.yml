# Primary CI gate: live integration on pegasus, atlas, and thor.
#
# Stage 1 — local prerequisites and gateway SSH (47810 only; port 22 untouched).
# Stage 2 — interconnectivity between runners via Styx gateway port 47810.

name: Styx runner integration

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: styx-runner-integration-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: read

jobs:
  prerequisites:
    name: "Stage 1 — prerequisites (${{ matrix.runner }})"
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        runner: [pegasus, atlas, thor]
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install styxctl
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install -e .
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Stage 1 — prerequisites
        env:
          RUNNER_NAME: ${{ matrix.runner }}
        run: python3 .github/scripts/stage1-prerequisites.py

      - name: Print stage 1 report
        if: always()
        run: python3 .github/scripts/print_report.py ${{ matrix.runner }} prerequisites

      - name: Upload stage 1 report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: styx-stage1-${{ matrix.runner }}
          path: reports/styx/runner-integration/${{ matrix.runner }}-prerequisites.json
          if-no-files-found: warn

  connectivity:
    name: "Stage 2 — connectivity (${{ matrix.runner }})"
    needs: prerequisites
    if: needs.prerequisites.result != 'cancelled'
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        runner: [pegasus, atlas, thor]
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install styxctl
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install -e .
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Stage 2 — connectivity
        env:
          RUNNER_NAME: ${{ matrix.runner }}
        run: python3 .github/scripts/stage2-connectivity.py

      - name: Print stage 2 report
        if: always()
        run: python3 .github/scripts/print_report.py ${{ matrix.runner }} connectivity

      - name: Upload stage 2 report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: styx-stage2-${{ matrix.runner }}
          path: reports/styx/runner-integration/${{ matrix.runner }}-connectivity.json
          if-no-files-found: warn

  summary:
    name: Integration summary
    needs: [prerequisites, connectivity]
    if: always()
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download stage reports
        uses: actions/download-artifact@v4
        with:
          pattern: styx-stage*
          merge-multiple: true
          path: reports/styx/runner-integration

      - name: Summarize test output
        run: python3 .github/scripts/summarize_reports.py reports/styx/runner-integration
