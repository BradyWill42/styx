# Primary CI gate: live integration on self-hosted runners.
#
# Requires a minimum viable cluster online — at least one init-server AND one agent
# (server optional) — and then tests EVERY online runner. The discovery job lists online
# runners via the GitHub API (RUNNER_API_TOKEN), gates on that role coverage, and from the
# same data GENERATES styx.yaml (node name + role per online runner) so the cluster config
# is never hand-maintained — the runner labels are the single source of truth. It also
# emits a dynamic matrix with one job pinned per online machine, so the suite scales with
# however many runners are online and offline ones are simply absent (no queue-hang).
# Each runner must carry its own name as a label so runs-on can pin to it.
#
# Uninstall — tear down any previous Styx state.
# Stage 1   — local prerequisites and gateway SSH (47810 only; port 22 untouched).
# Stage 2   — interconnectivity between runners via Styx gateway port 47810.

name: Styx runner integration

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: styx-runner-integration-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: read

jobs:
  discover:
    name: "Discover online runners (need init-server + agent)"
    runs-on: ubuntu-latest
    outputs:
      runners: ${{ steps.list.outputs.runners }}
    steps:
      - uses: actions/checkout@v7

      - name: List online runners and gate on role coverage
        id: list
        env:
          GH_TOKEN: ${{ secrets.RUNNER_API_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          gh api "repos/$REPO/actions/runners" > runners.json
          # Online runners targetable by their own name label — these are what we actually run.
          targetable="$(jq -c '[.runners[] | . as $r | select($r.status=="online") | select(([$r.labels[].name] | index($r.name)) != null)]' runners.json)"
          runners="$(printf '%s' "$targetable" | jq -c '[.[].name] | sort')"
          # A minimum viable cluster needs >=1 online init-server AND >=1 online agent (server optional).
          roles="$(printf '%s' "$targetable" | jq -c '[.[].labels[].name] | unique')"
          has_init="$(printf '%s' "$roles" | jq 'index("init-server") != null')"
          has_agent="$(printf '%s' "$roles" | jq 'index("agent") != null')"
          echo "Online targetable runners: $runners; roles: $roles"
          if [ "$has_init" != "true" ] || [ "$has_agent" != "true" ]; then
            echo "::error::Need at least one online init-server AND one online agent (server optional). Online: $runners; init-server=$has_init agent=$has_agent"
            exit 1
          fi
          echo "runners=$runners" >> "$GITHUB_OUTPUT"

      - name: Generate styx.yaml from runner labels
        run: |
          python3 -m pip install --quiet pyyaml
          python3 .github/scripts/generate_styx_config.py runners.json styx.yaml.example styx.yaml
          echo "---- generated styx.yaml ----"
          cat styx.yaml

      - name: Upload generated config
        uses: actions/upload-artifact@v7
        with:
          name: styx-config
          path: styx.yaml
          if-no-files-found: error

  uninstall:
    name: "Uninstall — ${{ matrix.runner }}"
    needs: discover
    strategy:
      fail-fast: false
      matrix:
        runner: ${{ fromJson(needs.discover.outputs.runners) }}
    runs-on: [self-hosted, "${{ matrix.runner }}"]
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v7

      - name: Use config generated from runner labels
        uses: actions/download-artifact@v8
        with:
          name: styx-config
          path: .

      - name: Install styxctl
        run: |
          python3 -m pip install --upgrade pip --break-system-packages
          python3 -m pip install -e . --break-system-packages
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Uninstall previous state
        run: python3 -m styxctl.cli uninstall apply local || true

  prerequisites:
    name: "Stage 1 — ${{ matrix.runner }}"
    needs: [discover, uninstall]
    if: needs.uninstall.result != 'cancelled'
    strategy:
      fail-fast: false
      matrix:
        runner: ${{ fromJson(needs.discover.outputs.runners) }}
    runs-on: [self-hosted, "${{ matrix.runner }}"]
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v7

      - name: Use config generated from runner labels
        uses: actions/download-artifact@v8
        with:
          name: styx-config
          path: .

      - name: Install styxctl
        run: |
          python3 -m pip install --upgrade pip --break-system-packages
          python3 -m pip install -e . --break-system-packages
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Stage 1 — prerequisites
        env:
          STYX_RUNNER_NAME: ${{ matrix.runner }}
        run: python3 .github/scripts/stage1-prerequisites.py

      - name: Print stage 1 report
        if: always()
        run: python3 .github/scripts/print_report.py "${{ matrix.runner }}" prerequisites

      - name: Upload stage 1 report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: styx-stage1-${{ matrix.runner }}
          path: reports/styx/runner-integration/${{ matrix.runner }}-prerequisites.json
          if-no-files-found: warn

  connectivity:
    name: "Stage 2 — ${{ matrix.runner }}"
    needs: [discover, prerequisites]
    if: needs.prerequisites.result != 'cancelled'
    strategy:
      fail-fast: false
      matrix:
        runner: ${{ fromJson(needs.discover.outputs.runners) }}
    runs-on: [self-hosted, "${{ matrix.runner }}"]
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v7

      - name: Use config generated from runner labels
        uses: actions/download-artifact@v8
        with:
          name: styx-config
          path: .

      - name: Install prerequisites
        run: |
          sudo apt-get install -y sshpass
          python3 -m pip install --upgrade pip --break-system-packages
          python3 -m pip install -e . --break-system-packages
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Stage 2 — connectivity
        env:
          STYX_RUNNER_NAME: ${{ matrix.runner }}
          SSHPASS: ${{ secrets.PIPASS }}
        run: python3 .github/scripts/stage2-connectivity.py

      - name: Print stage 2 report
        if: always()
        run: python3 .github/scripts/print_report.py "${{ matrix.runner }}" connectivity

      - name: Upload stage 2 report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: styx-stage2-${{ matrix.runner }}
          path: reports/styx/runner-integration/${{ matrix.runner }}-connectivity.json
          if-no-files-found: warn

  summary:
    name: Integration summary
    needs: [discover, prerequisites, connectivity]
    if: always()
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Download stage reports
        uses: actions/download-artifact@v8
        with:
          pattern: styx-stage*
          merge-multiple: true
          path: reports/styx/runner-integration

      - name: Summarize test output
        run: python3 .github/scripts/summarize_reports.py reports/styx/runner-integration || true
