# Primary CI gate: live integration on self-hosted runners.
#
# Runners must carry role labels: init-server, server, agent.
#
# Mandatory test: 1 init-server + 1 agent (minimum viable cluster).
# Full test:      1 init-server + 1 server + 1 agent (optional — passes even if server is offline).
#
# Uninstall — tear down any previous Styx state.
# Stage 1   — local prerequisites and gateway SSH (47810 only; port 22 untouched).
# Stage 2   — interconnectivity between runners via Styx gateway port 47810.

name: Styx runner integration

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: styx-runner-integration-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: read

jobs:
  uninstall:
    name: "Uninstall — ${{ matrix.role }} (${{ matrix.required && 'mandatory' || 'optional' }})"
    continue-on-error: ${{ !matrix.required }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - role: init-server
            required: true
          - role: agent
            required: true
    runs-on: [self-hosted, "${{ matrix.role }}"]
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Install styxctl
        run: |
          python3 -m pip install --upgrade pip --break-system-packages
          python3 -m pip install -e . --break-system-packages
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Uninstall previous state
        run: python3 -m styxctl.cli uninstall apply local || true

  prerequisites:
    name: "Stage 1 — ${{ matrix.role }} (${{ matrix.required && 'mandatory' || 'optional' }})"
    needs: uninstall
    if: needs.uninstall.result != 'cancelled'
    continue-on-error: ${{ !matrix.required }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - role: init-server
            required: true
          - role: agent
            required: true
    runs-on: [self-hosted, "${{ matrix.role }}"]
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Install styxctl
        run: |
          python3 -m pip install --upgrade pip --break-system-packages
          python3 -m pip install -e . --break-system-packages
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Stage 1 — prerequisites
        env:
          STYX_RUNNER_NAME: ${{ matrix.role }}
        run: python3 .github/scripts/stage1-prerequisites.py

      - name: Print stage 1 report
        if: always()
        run: python3 .github/scripts/print_report.py "${{ matrix.role }}" prerequisites

      - name: Upload stage 1 report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: styx-stage1-${{ matrix.role }}
          path: reports/styx/runner-integration/${{ matrix.role }}-prerequisites.json
          if-no-files-found: warn

  connectivity:
    name: "Stage 2 — ${{ matrix.role }} (${{ matrix.required && 'mandatory' || 'optional' }})"
    needs: prerequisites
    if: needs.prerequisites.result != 'cancelled'
    continue-on-error: ${{ !matrix.required }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - role: init-server
            required: true
          - role: agent
            required: true
    runs-on: [self-hosted, "${{ matrix.role }}"]
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Install prerequisites
        run: |
          sudo apt-get install -y sshpass
          python3 -m pip install --upgrade pip --break-system-packages
          python3 -m pip install -e . --break-system-packages
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Stage 2 — connectivity
        env:
          STYX_RUNNER_NAME: ${{ matrix.role }}
          SSHPASS: ${{ secrets.PIPASS }}
        run: python3 .github/scripts/stage2-connectivity.py

      - name: Print stage 2 report
        if: always()
        run: python3 .github/scripts/print_report.py "${{ matrix.role }}" connectivity

      - name: Upload stage 2 report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: styx-stage2-${{ matrix.role }}
          path: reports/styx/runner-integration/${{ matrix.role }}-connectivity.json
          if-no-files-found: warn

  summary:
    name: Integration summary
    needs: [prerequisites, connectivity]
    if: always()
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download stage reports
        uses: actions/download-artifact@v4
        with:
          pattern: styx-stage*
          merge-multiple: true
          path: reports/styx/runner-integration

      - name: Summarize test output
        run: python3 .github/scripts/summarize_reports.py reports/styx/runner-integration || true
