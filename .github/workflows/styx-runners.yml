# Primary CI gate: real integration tests on live self-hosted styx runners.
#
# Stage 1 — prerequisites (ports, sysprep, config) on each runner.
# Stage 2 — real SSH connectivity between runners on gateway port 47810.

name: Styx runner integration

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: styx-runner-integration-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  discover-runners:
    name: Discover online runners
    runs-on: ubuntu-latest
    outputs:
      runners: ${{ steps.discover.outputs.runners }}
    steps:
      - name: List live self-hosted runners
        id: discover
        uses: actions/github-script@v7
        with:
          script: |
            const { data } = await github.rest.actions.listSelfHostedRunnersForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
            });

            const online = data.runners.filter((runner) => runner.status === "online");
            const names = online.map((runner) => runner.name).sort();

            core.info(`Online runners: ${names.join(", ") || "none"}`);
            if (names.length === 0) {
              core.setFailed("No online self-hosted runners available");
            }

            core.setOutput("runners", JSON.stringify(names));

  prerequisites:
    name: "Stage 1 — prerequisites (${{ matrix.runner }})"
    needs: discover-runners
    if: needs.discover-runners.outputs.runners != '[]'
    strategy:
      fail-fast: false
      matrix:
        runner: ${{ fromJson(needs.discover-runners.outputs.runners) }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install styxctl
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install -e .

      - name: Stage 1 — prerequisites
        env:
          RUNNER_NAME: ${{ matrix.runner }}
        run: python3 .github/scripts/stage1-prerequisites.py

      - name: Upload stage 1 report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: styx-stage1-${{ matrix.runner }}
          path: reports/styx/runner-integration/
          if-no-files-found: warn

  connectivity:
    name: "Stage 2 — connectivity (${{ matrix.runner }})"
    needs: [discover-runners, prerequisites]
    if: |
      always() &&
      needs.discover-runners.outputs.runners != '[]' &&
      needs.prerequisites.result != 'cancelled'
    strategy:
      fail-fast: false
      matrix:
        runner: ${{ fromJson(needs.discover-runners.outputs.runners) }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install styxctl
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install -e .

      - name: Stage 2 — connectivity
        env:
          RUNNER_NAME: ${{ matrix.runner }}
        run: python3 .github/scripts/stage2-connectivity.py

      - name: Upload stage 2 report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: styx-stage2-${{ matrix.runner }}
          path: reports/styx/runner-integration/
          if-no-files-found: warn
