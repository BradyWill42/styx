# Primary CI gate: live integration on pegasus, atlas, and thor.
#
# Stage 1 — prerequisites (ports, sysprep, config, gateway SSH) on each runner.
# Stage 2 — real SSH connectivity between all runners on gateway port 47810.

name: Styx runner integration

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: styx-runner-integration-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  prerequisites:
    name: "Stage 1 — prerequisites (${{ matrix.runner }})"
    strategy:
      fail-fast: false
      matrix:
        runner: [pegasus, atlas, thor]
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install styxctl
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install -e .
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Stage 1 — prerequisites
        env:
          RUNNER_NAME: ${{ matrix.runner }}
        run: python3 .github/scripts/stage1-prerequisites.py

      - name: Upload stage 1 report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: styx-stage1-${{ matrix.runner }}
          path: reports/styx/runner-integration/
          if-no-files-found: warn

  connectivity:
    name: "Stage 2 — connectivity (${{ matrix.runner }})"
    needs: prerequisites
    if: needs.prerequisites.result == 'success'
    strategy:
      fail-fast: false
      matrix:
        runner: [pegasus, atlas, thor]
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install styxctl
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install -e .
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Stage 2 — connectivity
        env:
          RUNNER_NAME: ${{ matrix.runner }}
        run: python3 .github/scripts/stage2-connectivity.py

      - name: Upload stage 2 report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: styx-stage2-${{ matrix.runner }}
          path: reports/styx/runner-integration/
          if-no-files-found: warn
