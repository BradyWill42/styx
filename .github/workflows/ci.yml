name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  package:
    name: Package sanity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install and verify CLI
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          styxctl version
          styxctl --help
          styxctl deploy dns --help
          styxctl deploy resolver --help
          styxctl deploy reresolve --help
          styxctl status --help
          styxctl doctor --help
          styxctl mesh --help
          styxctl client --help
          # rendered k8s manifests must parse as YAML (block-scalar shell scripts are easy to mis-indent)
          python -c "import yaml; from styxctl.cluster_dns import render_resolver_manifest as r, parse_resolver_settings as p; list(yaml.safe_load_all(r(p({})))); print('resolver manifest: valid YAML')"
          python -c "import yaml; from styxctl.reresolve import render_reresolve_manifest as r, parse_reresolve_settings as p; list(yaml.safe_load_all(r(p({})))); print('reresolve manifest: valid YAML')"

      - name: Unit tests (pure logic — no cluster, no pithor)
        run: |
          python -m pip install pytest
          pytest -q

      - name: Verify deploy dns + mesh plans render (no cluster)
        run: |
          cp .github/fixtures/styx.test.yaml styx.yaml   # fixture carries roles (no runner labels in render-tests)
          styxctl deploy dns plan | tee /tmp/dns-plan.txt
          grep -q "kind: Deployment" /tmp/dns-plan.txt          # per-site publisher
          grep -q "name: DUCKDNS_DOMAINS" /tmp/dns-plan.txt      # publishes site names
          grep -q "kubernetes.io/hostname" /tmp/dns-plan.txt     # pinned to the site leader
          grep -q "pistyx" /tmp/dns-plan.txt                     # floating gateway name rides the holder's site
          styxctl mesh plan | tee /tmp/mesh-plan.txt
          grep -q "hub: pegasus" /tmp/mesh-plan.txt              # init-server is the hub
          grep -q "AllowedIPs = 10.0.0.0/14" /tmp/mesh-plan.txt  # spokes route the supernet
          grep -q "PersistentKeepalive = 25" /tmp/mesh-plan.txt  # spoke -> hub keepalive
          grep -q "Endpoint = pipegasus.duckdns.org:" /tmp/mesh-plan.txt  # DuckDNS name, never a hardcoded IP
          grep -q "StyxSite1=site 1 via pegasus:47821" /tmp/mesh-plan.txt # every Pi gets every site overlay
          grep -q -- "--- pegasus [StyxSite1] ---" /tmp/mesh-plan.txt
          grep -q "Address = 10.0.1.10/24" /tmp/mesh-plan.txt              # Pi site identity uses stable .10+ band
          grep -q -- "--- pegasus [StyxSite2] ---" /tmp/mesh-plan.txt
          grep -q "Address = 10.0.2.10/24" /tmp/mesh-plan.txt              # same Pi suffix in a different site
          grep -q "pistyx (egress gateway): pegasus" /tmp/mesh-plan.txt   # the leader runs the pistyx PoP
          grep -q "StyxEgress" /tmp/mesh-plan.txt                          # separate client-entry interface
          grep -q "ListenPort = 47801" /tmp/mesh-plan.txt                  # PoP listens for clients
          grep -q "Address = 10.0.1.1/24" /tmp/mesh-plan.txt               # PoP binds the holder site's pistyx addr
          # Roadwarrior client dials pistyx (the floating entry), egress is the leader's LOCAL internet
          styxctl client config testclient --render-only | tee /tmp/client.txt
          grep -q "Endpoint = pistyx.duckdns.org:47801" /tmp/client.txt    # dials the floating pistyx name
          grep -q "Address = 10.0.1.2/32" /tmp/client.txt                  # client suffix stays stable inside holder site
          grep -q "AllowedIPs = 0.0.0.0/0, ::/0" /tmp/client.txt           # full-tunnel to the PoP
          grep -q "MTU = 1420" /tmp/client.txt
          styxctl mesh pistyx show | tee /tmp/pistyx.txt
          grep -q "holder pegasus" /tmp/pistyx.txt                          # PoP leader defaults to the init-server
          grep -q "pistyx.duckdns.org:47801" /tmp/pistyx.txt               # the floating entry endpoint
          # Node-local DNS resolver + forced /etc/resolv.conf (all pod-based)
          styxctl deploy resolver plan | tee /tmp/resolver.txt
          grep -q "kind: DaemonSet" /tmp/resolver.txt                       # resolver + enforcer run as pods
          grep -q "name: styx-resolver" /tmp/resolver.txt                   # node-local CoreDNS cache
          grep -q "hostNetwork: true" /tmp/resolver.txt                     # binds 127.0.0.1:53 on the node
          grep -q "name: styx-resolv-enforcer" /tmp/resolver.txt            # the resolv.conf enforcer
          grep -q "privileged: true" /tmp/resolver.txt                      # needs host /etc + chattr
          grep -q "chattr +i" /tmp/resolver.txt                             # makes resolv.conf immutable
          grep -q "nameserver 127.0.0.1" /tmp/resolver.txt                  # forces node DNS to the local resolver
          # WG endpoint re-resolution DaemonSet (nodes follow DuckDNS repoints)
          styxctl deploy reresolve plan | tee /tmp/reresolve.txt
          grep -q "name: styx-reresolve" /tmp/reresolve.txt                 # runs as a pod (DaemonSet)
          grep -q "path: /etc/wireguard" /tmp/reresolve.txt                 # reads the host WG confs
          grep -q "wg set" /tmp/reresolve.txt                               # re-points the endpoint when the IP changes
          styxctl client reresolve-unit | tee /tmp/cl-reresolve.txt         # Linux client companion (systemd timer)
          grep -q "OnUnitActiveSec" /tmp/cl-reresolve.txt
          grep -q "wg set" /tmp/cl-reresolve.txt
          # one-command deploy of ALL pod services renders dns (Deployment) + resolver/reresolve (DaemonSets)
          styxctl deploy all plan | tee /tmp/all.txt
          grep -q "kind: Deployment" /tmp/all.txt
          grep -q "kind: DaemonSet" /tmp/all.txt
          rm -f styx.yaml

      - name: Hosted pistyx render/move smoke
        run: python .github/scripts/pistyx_hosted_smoke.py --render-checks

      - name: Build wheel
        run: python -m pip install build && python -m build
