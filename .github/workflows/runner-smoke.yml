# Quick connectivity test for self-hosted runners (manual).

name: Runner smoke

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ping:
    name: Runner ping (${{ matrix.runner }})
    strategy:
      fail-fast: false
      matrix:
        runner: [pegasus, kraken, thor]
    runs-on: ${{ matrix.runner }}

    steps:
      - run: |
          echo "Runner name: $RUNNER_NAME"
          echo "Hostname: $(hostname -f)"
          echo "User: $(whoami)"
          command -v python3
          command -v ssh
          command -v curl
          sudo -n true && echo "passwordless sudo: yes" || echo "passwordless sudo: no"
