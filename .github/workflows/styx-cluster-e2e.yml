# Full cluster install on live self-hosted runners (manual, destructive).
#
# Order: preflight uninstall → install local (each runner) → cluster join → teardown uninstall.

name: Styx cluster E2E

on:
  workflow_dispatch:
    inputs:
      skip_preflight_uninstall:
        description: Skip the preflight cluster uninstall (not recommended)
        type: boolean
        default: false
      skip_teardown_uninstall:
        description: Leave Styx/k3s installed after the run
        type: boolean
        default: false

concurrency:
  group: styx-cluster-e2e
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  preflight-uninstall:
    name: "1. Preflight uninstall (clean slate)"
    if: inputs.skip_preflight_uninstall != true
    runs-on: pegasus

    steps:
      - uses: actions/checkout@v7

      - name: What styxctl uninstall does (exact scope)
        run: |
          cat <<'EOF'
          styxctl uninstall apply cluster removes k3s, Styx WireGuard, gateway sshd drop-in,
          and Styx firewall rules on each node. Preserves wg0, port 22, and /etc/styx/styx.yaml.
          EOF

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install styxctl
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install -e .

      - name: Use repo or existing styx.yaml
        run: |
          if [ -f /etc/styx/styx.yaml ]; then
            cp /etc/styx/styx.yaml styx.yaml
            echo "Using /etc/styx/styx.yaml"
          else
            cp styx.yaml.example styx.yaml
            echo "Using styx.yaml.example from repo"
          fi

      - name: Preview uninstall plan (per-node will-remove vs will-preserve)
        run: styxctl uninstall plan cluster

      - name: Apply preflight cluster uninstall
        run: styxctl uninstall apply cluster

  install-local:
    name: "2. Install local (${{ matrix.runner }})"
    needs: preflight-uninstall
    if: |
      always() &&
      (needs.preflight-uninstall.result == 'success' || needs.preflight-uninstall.result == 'skipped')
    strategy:
      fail-fast: false
      matrix:
        runner: [pegasus, kraken, thor]
    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install styxctl
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install -e .

      - name: Use repo or existing styx.yaml
        run: |
          if [ -f /etc/styx/styx.yaml ]; then
            cp /etc/styx/styx.yaml styx.yaml
            echo "Using /etc/styx/styx.yaml"
          else
            cp styx.yaml.example styx.yaml
            echo "Using styx.yaml.example from repo"
          fi

      - name: Install local foundation
        run: styxctl install apply local

      - name: Local install status
        run: styxctl install status local

  cluster-join:
    name: "3. Cluster join"
    needs: install-local
    if: needs.install-local.result == 'success'
    runs-on: pegasus

    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install styxctl
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install -e .

      - name: Use repo or existing styx.yaml
        run: |
          if [ -f /etc/styx/styx.yaml ]; then
            cp /etc/styx/styx.yaml styx.yaml
          else
            cp styx.yaml.example styx.yaml
          fi

      - name: Join cluster
        run: styxctl install apply cluster

      - name: Cluster doctor
        run: styxctl install doctor cluster

  deploy-dns:
    name: "4. Deploy DuckDNS publisher"
    needs: cluster-join
    if: needs.cluster-join.result == 'success'
    runs-on: pegasus

    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install styxctl
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install -e .

      - name: Use repo or existing styx.yaml
        run: |
          if [ -f /etc/styx/styx.yaml ]; then
            cp /etc/styx/styx.yaml styx.yaml
          else
            cp styx.yaml.example styx.yaml
          fi

      - name: Plan DuckDNS publisher (no token needed)
        run: styxctl deploy dns plan

      - name: Apply DuckDNS publisher
        env:
          DUCKDNS_TOKEN: ${{ secrets.DUCKDNS_TOKEN }}
        run: styxctl deploy dns apply

      - name: Show DuckDNS publisher pod
        run: sudo kubectl -n styx-system get pods -o wide

      - name: Cluster status (should show DuckDNS running)
        run: styxctl status

      - name: Cluster doctor
        run: styxctl doctor

  teardown-uninstall:
    name: "5. Teardown uninstall"
    needs: [install-local, cluster-join, deploy-dns]
    if: always() && inputs.skip_teardown_uninstall != true
    runs-on: pegasus

    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install styxctl
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install -e .

      - name: Use repo or existing styx.yaml
        run: |
          if [ -f /etc/styx/styx.yaml ]; then
            cp /etc/styx/styx.yaml styx.yaml
          else
            cp styx.yaml.example styx.yaml
          fi

      - name: Preview teardown uninstall
        run: styxctl uninstall plan cluster

      - name: Apply teardown cluster uninstall
        run: styxctl uninstall apply cluster
