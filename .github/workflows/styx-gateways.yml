# Self-hosted gateway checks on the co-located hub runners: pegasus and atlas.
# Tests init-server + agent roles with LAN election on the shared LAN hub.

name: Styx gateway checks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: styx-gateways-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  pytest:
    name: Pytest (${{ matrix.runner }})
    strategy:
      fail-fast: false
      matrix:
        runner: [pegasus, atlas]
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Identify runner host
        run: |
          echo "Runner name: $RUNNER_NAME"
          echo "Hostname: $(hostname -s)"
          echo "Architecture: $(uname -m)"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install styxctl and test dependencies
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install -e ".[dev]"

      - name: Run pytest suite
        run: python3 -m pytest -v

  lan-election:
    name: LAN election (${{ matrix.runner }})
    strategy:
      fail-fast: false
      matrix:
        runner: [pegasus, atlas]
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install styxctl
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install -e .

      - name: Prepare homelab styx.yaml
        run: |
          if [ -f /etc/styx/styx.yaml ]; then
            cp /etc/styx/styx.yaml styx.yaml
          else
            cp styx.yaml.homelab styx.yaml
          fi

      - name: Run LAN election plan
        run: |
          mkdir -p reports/styx
          python3 - <<'PY'
          import json
          from pathlib import Path

          from styxctl.install import run_lan_election_preview

          report, exit_code = run_lan_election_preview(config_path=Path("styx.yaml"))
          Path("reports/styx/lan-election-plan.json").write_text(
              json.dumps(report, indent=2) + "\n",
              encoding="utf-8",
          )
          print(json.dumps(report["lan_election"], indent=2))
          raise SystemExit(exit_code)
          PY

      - name: Verify init-server and agent hub election
        run: python3 .github/scripts/verify-lan-election.py reports/styx/lan-election-plan.json

      - name: Upload LAN election report
        uses: actions/upload-artifact@v4
        with:
          name: styx-lan-election-${{ matrix.runner }}
          path: reports/styx/
          if-no-files-found: error

  gateway-check:
    name: Gateway check (${{ matrix.runner }})
    strategy:
      fail-fast: false
      matrix:
        runner: [pegasus, atlas]
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30

    steps:
      - name: Identify runner host
        run: |
          echo "Runner name: $RUNNER_NAME"
          echo "Runner labels: $RUNNER_LABELS"
          echo "Hostname: $(hostname -s)"
          echo "Architecture: $(uname -m)"

      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install styxctl
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install -e ".[dev]"

      - name: Prepare styx.yaml
        run: |
          if [ -f /etc/styx/styx.yaml ]; then
            cp /etc/styx/styx.yaml styx.yaml
            echo "Using /etc/styx/styx.yaml"
          else
            cp styx.yaml.homelab styx.yaml
            echo "Using styx.yaml.homelab from repo"
          fi

      - name: Sysprep and plan checks
        run: |
          styxctl sysprep check local
          styxctl sysprep safe plan local
          styxctl ports check local
          styxctl config validate
          styxctl install plan local
          styxctl install plan cluster
          styxctl uninstall plan local
          styxctl uninstall plan cluster
          styxctl install status local || true
          styxctl install doctor local || true

      - name: Verify sysprep report
        run: |
          test -d reports/styx
          hostname="$(ls reports/styx | head -n1)"
          test -f "reports/styx/${hostname}/sysprep-report.json"
          python3 - <<'PY'
          import json
          from pathlib import Path

          report_dir = next(Path("reports/styx").iterdir())
          report = json.loads((report_dir / "sysprep-report.json").read_text())
          assert report["status"] in {"READY", "READY_WITH_WARNINGS", "BLOCKED"}
          print(f"Sysprep status on {report_dir.name}: {report['status']}")
          PY

      - name: Upload gateway reports
        uses: actions/upload-artifact@v4
        with:
          name: styx-gateway-report-${{ matrix.runner }}
          path: reports/styx/
          if-no-files-found: error

  cluster-plan:
    name: Cluster plan (pegasus init)
    needs: [pytest, lan-election]
    runs-on: pegasus
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install styxctl
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install -e .

      - name: Prepare styx.yaml
        run: |
          if [ -f /etc/styx/styx.yaml ]; then
            cp /etc/styx/styx.yaml styx.yaml
          else
            cp styx.yaml.homelab styx.yaml
          fi

      - name: Cluster status and doctor
        run: |
          styxctl install status cluster || true
          styxctl install doctor cluster || true
