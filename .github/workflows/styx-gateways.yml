# Discover online self-hosted runners and run gateway checks only on live nodes.
#
# Runners (account-level): atlas, pegasus, thor
# Role labels vary per host (init-server, server, agent).
# Offline runners are skipped automatically via the discover job.

name: Styx gateway checks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: styx-gateways-${{ github.ref }}
  cancel-in-progress: true

permissions:
  actions: read
  contents: read

jobs:
  discover-runners:
    name: Discover online runners
    if: >-
      github.event_name != 'pull_request' ||
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    outputs:
      runners: ${{ steps.discover.outputs.runners }}
      init_runner: ${{ steps.discover.outputs.init_runner }}
      colocated_online: ${{ steps.discover.outputs.colocated_online }}
      thor_online: ${{ steps.discover.outputs.thor_online }}
      expected_runners: ${{ steps.discover.outputs.expected_runners }}
    steps:
      - name: List live self-hosted runners
        id: discover
        uses: actions/github-script@v7
        with:
          script: |
            const expectedRunners = ["atlas", "pegasus", "thor"];
            const colocatedHub = ["pegasus", "atlas"];

            const { data } = await github.rest.actions.listSelfHostedRunnersForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
            });

            const online = data.runners.filter((runner) => runner.status === "online");
            const names = online.map((runner) => runner.name).sort();

            const initPreference = ["pegasus", "atlas", "thor"];
            const initCandidates = online.filter((runner) =>
              runner.labels.some((label) => label.name === "init-server")
            );
            const initRunner =
              initPreference.find((name) =>
                initCandidates.some((runner) => runner.name === name)
              ) || initCandidates[0]?.name || "";

            const colocatedOnline = colocatedHub
              .filter((name) => names.includes(name))
              .sort();
            const thorOnline = names.includes("thor");

            core.info(`Expected runners: ${expectedRunners.join(", ")}`);
            core.info(`Online runners: ${names.join(", ") || "none"}`);
            core.info(`Co-located hub online: ${colocatedOnline.join(", ") || "none"}`);
            core.info(`Thor online: ${thorOnline}`);
            core.info(`Init runner: ${initRunner || "none"}`);

            for (const runner of data.runners) {
              core.info(
                `  ${runner.name}: status=${runner.status}, busy=${runner.busy}, ` +
                  `labels=${runner.labels.map((label) => label.name).join(", ")}`
              );
            }

            const missing = expectedRunners.filter((name) => !names.includes(name));
            if (missing.length > 0) {
              core.warning(`Offline or missing runners (skipped this run): ${missing.join(", ")}`);
            }

            if (names.length === 0) {
              core.setFailed("No online self-hosted runners available");
            }

            core.setOutput("runners", JSON.stringify(names));
            core.setOutput("init_runner", initRunner);
            core.setOutput("colocated_online", JSON.stringify(colocatedOnline));
            core.setOutput("thor_online", thorOnline ? "true" : "false");
            core.setOutput("expected_runners", JSON.stringify(expectedRunners));

  pytest:
    name: Pytest (${{ matrix.runner }})
    needs: discover-runners
    if: needs.discover-runners.outputs.runners != '[]'
    strategy:
      fail-fast: false
      matrix:
        runner: ${{ fromJson(needs.discover-runners.outputs.runners) }}
    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v4

      - name: Identify runner host
        run: |
          echo "Runner name: $RUNNER_NAME"
          echo "Hostname: $(hostname -s)"
          echo "Architecture: $(uname -m)"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install styxctl and test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run pytest suite
        run: python -m pytest -v

  gateway-check:
    name: Gateway check (${{ matrix.runner }})
    needs: discover-runners
    if: needs.discover-runners.outputs.runners != '[]'
    strategy:
      fail-fast: false
      matrix:
        runner: ${{ fromJson(needs.discover-runners.outputs.runners) }}
    runs-on: ${{ matrix.runner }}

    steps:
      - name: Identify runner host
        run: |
          echo "Runner name: $RUNNER_NAME"
          echo "Runner labels: $RUNNER_LABELS"
          echo "Hostname: $(hostname -s)"
          echo "Architecture: $(uname -m)"

      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install styxctl
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Prepare styx.yaml
        run: |
          if [ -f /etc/styx/styx.yaml ]; then
            cp /etc/styx/styx.yaml styx.yaml
            echo "Using /etc/styx/styx.yaml"
          else
            cp styx.yaml.homelab styx.yaml
            echo "Using styx.yaml.homelab from repo"
          fi

      - name: Sysprep and plan checks
        run: |
          styxctl sysprep check local
          styxctl sysprep safe plan local
          styxctl ports check local
          styxctl config validate
          styxctl install plan local
          styxctl install plan cluster
          styxctl uninstall plan local
          styxctl uninstall plan cluster
          styxctl install status local || true
          styxctl install doctor local || true

      - name: Verify sysprep report
        run: |
          test -d reports/styx
          hostname="$(ls reports/styx | head -n1)"
          test -f "reports/styx/${hostname}/sysprep-report.json"
          python - <<'PY'
          import json
          from pathlib import Path

          report_dir = next(Path("reports/styx").iterdir())
          report = json.loads((report_dir / "sysprep-report.json").read_text())
          assert report["status"] in {"READY", "READY_WITH_WARNINGS", "BLOCKED"}
          print(f"Sysprep status on {report_dir.name}: {report['status']}")
          PY

      - name: Upload gateway reports
        uses: actions/upload-artifact@v4
        with:
          name: styx-gateway-report-${{ matrix.runner }}
          path: reports/styx/
          if-no-files-found: error

  lan-election-hub:
    name: LAN hub election (${{ matrix.runner }})
    needs: discover-runners
    if: needs.discover-runners.outputs.colocated_online != '[]'
    strategy:
      fail-fast: false
      matrix:
        runner: ${{ fromJson(needs.discover-runners.outputs.colocated_online) }}
    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install styxctl
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Prepare homelab styx.yaml
        run: |
          if [ -f /etc/styx/styx.yaml ]; then
            cp /etc/styx/styx.yaml styx.yaml
          else
            cp styx.yaml.homelab styx.yaml
          fi

      - name: Note remote site availability
        run: |
          if [ "${{ needs.discover-runners.outputs.thor_online }}" = "true" ]; then
            echo "thor is online (remote site); hub election should still be pegasus/atlas only"
          else
            echo "thor is offline; pegasus and atlas should elect the hub leader on their shared LAN"
          fi

      - name: Run LAN election plan
        run: |
          mkdir -p reports/styx
          python - <<'PY'
          import json
          from pathlib import Path

          from styxctl.install import run_lan_election_preview

          report, exit_code = run_lan_election_preview(config_path=Path("styx.yaml"))
          Path("reports/styx/lan-election-plan.json").write_text(
              json.dumps(report, indent=2) + "\n",
              encoding="utf-8",
          )
          print(json.dumps(report["lan_election"], indent=2))
          raise SystemExit(exit_code)
          PY

      - name: Verify co-located hub election
        run: python .github/scripts/verify-lan-election.py reports/styx/lan-election-plan.json

      - name: Upload LAN election report
        uses: actions/upload-artifact@v4
        with:
          name: styx-lan-election-${{ matrix.runner }}
          path: reports/styx/
          if-no-files-found: error

  cluster-plan:
    name: Cluster plan (init runner)
    needs: discover-runners
    if: needs.discover-runners.outputs.init_runner != ''
    runs-on: ${{ needs.discover-runners.outputs.init_runner }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install styxctl
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Prepare styx.yaml
        run: |
          if [ -f /etc/styx/styx.yaml ]; then
            cp /etc/styx/styx.yaml styx.yaml
          else
            cp styx.yaml.homelab styx.yaml
          fi

      - name: Cluster status and doctor
        run: |
          styxctl install status cluster || true
          styxctl install doctor cluster || true
