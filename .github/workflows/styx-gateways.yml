# Discover online self-hosted runners and run gateway checks only on live nodes.
#
# Runners (account-level): atlas, pegasus, thor
# Role labels vary per host (init-server, server, agent).
# Offline runners are skipped automatically via the discover job.

name: Styx gateway checks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: styx-gateways-${{ github.ref }}
  cancel-in-progress: true

permissions:
  actions: read
  contents: read

jobs:
  discover-runners:
    name: Discover online runners
    if: >-
      github.event_name != 'pull_request' ||
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    outputs:
      runners: ${{ steps.discover.outputs.runners }}
      init_runner: ${{ steps.discover.outputs.init_runner }}
    steps:
      - name: List live self-hosted runners
        id: discover
        uses: actions/github-script@v7
        with:
          script: |
            const { data } = await github.rest.actions.listSelfHostedRunnersForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
            });

            const online = data.runners.filter((runner) => runner.status === "online");
            const names = online.map((runner) => runner.name).sort();

            const initPreference = ["pegasus", "atlas", "thor"];
            const initCandidates = online.filter((runner) =>
              runner.labels.some((label) => label.name === "init-server")
            );
            const initRunner =
              initPreference.find((name) =>
                initCandidates.some((runner) => runner.name === name)
              ) || initCandidates[0]?.name || "";

            core.info(`Online runners: ${names.join(", ") || "none"}`);
            core.info(`Init runner: ${initRunner || "none"}`);
            for (const runner of data.runners) {
              core.info(
                `  ${runner.name}: status=${runner.status}, busy=${runner.busy}, ` +
                  `labels=${runner.labels.map((label) => label.name).join(", ")}`
              );
            }

            if (names.length === 0) {
              core.setFailed("No online self-hosted runners available");
            }

            core.setOutput("runners", JSON.stringify(names));
            core.setOutput("init_runner", initRunner);

  gateway-check:
    name: Gateway check (${{ matrix.runner }})
    needs: discover-runners
    if: needs.discover-runners.outputs.runners != '[]'
    strategy:
      fail-fast: false
      matrix:
        runner: ${{ fromJson(needs.discover-runners.outputs.runners) }}
    runs-on: ${{ matrix.runner }}

    steps:
      - name: Identify runner host
        run: |
          echo "Runner name: $RUNNER_NAME"
          echo "Runner labels: $RUNNER_LABELS"
          echo "Hostname: $(hostname -s)"
          echo "Architecture: $(uname -m)"

      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install styxctl
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Prepare styx.yaml
        run: cp styx.yaml.example styx.yaml

      - name: Sysprep and plan checks
        run: |
          styxctl sysprep check local
          styxctl sysprep safe plan local
          styxctl ports check local
          styxctl config validate
          styxctl install plan local
          styxctl install plan cluster
          styxctl uninstall plan local
          styxctl uninstall plan cluster
          styxctl install status local || true
          styxctl install doctor local || true

      - name: Verify sysprep report
        run: |
          test -d reports/styx
          hostname="$(ls reports/styx | head -n1)"
          test -f "reports/styx/${hostname}/sysprep-report.json"
          python - <<'PY'
          import json
          from pathlib import Path

          report_dir = next(Path("reports/styx").iterdir())
          report = json.loads((report_dir / "sysprep-report.json").read_text())
          assert report["status"] in {"READY", "READY_WITH_WARNINGS", "BLOCKED"}
          print(f"Sysprep status on {report_dir.name}: {report['status']}")
          PY

      - name: Upload gateway reports
        uses: actions/upload-artifact@v4
        with:
          name: styx-gateway-report-${{ matrix.runner }}
          path: reports/styx/
          if-no-files-found: error

  cluster-plan:
    name: Cluster plan (init runner)
    needs: discover-runners
    if: needs.discover-runners.outputs.init_runner != ''
    runs-on: ${{ needs.discover-runners.outputs.init_runner }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install styxctl
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Prepare styx.yaml
        run: cp styx.yaml.example styx.yaml

      - name: Cluster status and doctor
        run: |
          styxctl install status cluster || true
          styxctl install doctor cluster || true
